name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional tag/version string used for ldflags version metadata (e.g. v1.2.3)'
        required: false
        type: string
        
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"

          if [ -z "$TAG" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "workflow_dispatch requires release_tag when not running from a tag ref" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Binaries
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.tag }}"
          FOLDER_NAME="flow-driver-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p $FOLDER_NAME
          
          SUFFIX=""
          if [ "${{ matrix.goos }}" == "windows" ]; then
            SUFFIX=".exe"
          fi
          
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o $FOLDER_NAME/client$SUFFIX ./cmd/client
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o $FOLDER_NAME/server$SUFFIX ./cmd/server
          
          cp client_config.json.example $FOLDER_NAME/
          cp server_config.json.example $FOLDER_NAME/
          cp README.md $FOLDER_NAME/
          
          zip -r "${FOLDER_NAME}.zip" $FOLDER_NAME

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.tag }}
          files: flow-driver-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
