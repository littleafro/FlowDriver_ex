name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional tag/version string used for ldflags version metadata (e.g. v1.2.3)'
        required: false
        type: string
        
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64


    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"

          if [ -z "$TAG" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            TAG="$(git tag --points-at "$GITHUB_SHA" | grep -E '^v' | head -n1 || true)"
          fi

          if [ -z "$TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No v* tag found for commit $GITHUB_SHA. Push the tag ref too (e.g. git push origin vX.Y.Z or git push --follow-tags)." >&2
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.meta.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Binaries
        if: steps.meta.outputs.skip != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.tag }}"
          FOLDER_NAME="flow-driver-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p $FOLDER_NAME
          
          SUFFIX=""
          if [ "${{ matrix.goos }}" == "windows" ]; then
            SUFFIX=".exe"
          fi
          
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o $FOLDER_NAME/client$SUFFIX ./cmd/client
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o $FOLDER_NAME/server$SUFFIX ./cmd/server
          
          cp client_config.json.example $FOLDER_NAME/
          cp server_config.json.example $FOLDER_NAME/
          cp README.md $FOLDER_NAME/
          
          zip -r "${FOLDER_NAME}.zip" $FOLDER_NAME

      - name: Release
        if: steps.meta.outputs.skip != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.tag }}
          files: flow-driver-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
